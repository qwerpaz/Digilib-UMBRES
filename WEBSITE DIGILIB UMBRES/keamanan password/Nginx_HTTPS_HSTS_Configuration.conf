# ============================================================================
# Konfigurasi HTTPS & HSTS untuk Nginx Server
# ============================================================================
# File ini berisi konfigurasi keamanan lengkap untuk mengaktifkan HTTPS 
# dan HTTP Strict Transport Security (HSTS) pada server Nginx.
# ============================================================================

# ==========================
# 1. REDIRECT HTTP KE HTTPS
# ==========================
# Server block untuk redirect dari HTTP ke HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;
    
    # Redirect semua traffic HTTP ke HTTPS
    return 301 https://$server_name$request_uri;
}

# ==========================
# 2. KONFIGURASI HTTPS
# ==========================
# Server block untuk HTTPS dengan SSL/TLS
server {
    # Port untuk HTTPS
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name example.com www.example.com;
    
    # ========================
    # 3. SERTIFIKAT SSL/TLS
    # ========================
    # Path ke sertifikat SSL (ganti dengan path sebenarnya)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # Sertifikat keamanan tambahan (opsional)
    # ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
    
    # ========================
    # 4. PROTOKOL SSL/TLS
    # ========================
    # Gunakan versi TLS terbaru dan hindari yang sudah deprecated
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Urutkan cipher berdasarkan preferensi server
    ssl_prefer_server_ciphers on;
    
    # Cipher suites yang aman dan modern
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    
    # ========================
    # 5. KONFIGURASI SESSION
    # ========================
    # Durasi session cache SSL
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # ========================
    # 6. HSTS (HTTP Strict Transport Security)
    # ========================
    # Wajib menggunakan HTTPS selama 1 tahun (31536000 detik)
    # includeSubDomains: berlaku untuk semua subdomain
    # preload: untuk inclusion dalam HSTS preload list
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # ========================
    # 7. KEAMANAN HEADER LAINNYA
    # ========================
    # Cegah MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Proteksi dari clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Proteksi dari XSS
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    
    # ========================
    # 8. OCSP STAPLING
    # ========================
    # Tingkatkan performa dengan OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # Resolver untuk OCSP
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # ========================
    # 9. LOGGING
    # ========================
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
    
    # ========================
    # 10. KONFIGURASI DASAR
    # ========================
    # Root directory untuk file statis
    root /var/www/example.com;
    
    # File index default
    index index.html index.htm;
    
    # ========================
    # 11. LOCATION BLOCKS
    # ========================
    location / {
        # Proxy ke aplikasi backend (jika diperlukan)
        # proxy_pass http://localhost:3000;
        # proxy_set_header Host $host;
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;
        
        # Atau serve file statis
        try_files $uri $uri/ =404;
    }
    
    # Cache untuk aset statis
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Jangan cache file HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
}

# ============================================================================
# CATATAN PENTING:
# ============================================================================
# 1. Ganti "example.com" dan "www.example.com" dengan domain Anda
# 2. Update path sertifikat SSL sesuai lokasi sebenarnya
# 3. Jika menggunakan Let's Encrypt, letakkan di /etc/letsencrypt/live/domain/
# 4. Test konfigurasi: nginx -t
# 5. Reload Nginx: systemctl reload nginx
# 6. Monitor SSL: https://www.ssllabs.com/ssltest/
# 7. Periksa HSTS preload status: https://hstspreload.org/

# ============================================================================
# PEMBARUAN SERTIFIKAT DENGAN LET'S ENCRYPT:
# ============================================================================
# Instal Certbot:
# sudo apt-get install certbot python3-certbot-nginx
#
# Buat sertifikat baru:
# sudo certbot certonly --nginx -d example.com -d www.example.com
#
# Perpanjang otomatis (crontab):
# 0 0 1 * * /usr/bin/certbot renew --quiet && systemctl reload nginx
